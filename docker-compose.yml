services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: unless-stopped

  cron:
    build: .
    command: node server/cron-worker.mjs
    env_file:
      - .env
    environment:
      - CRON_BASE_URL=http://web:3000
    depends_on:
      - web
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
